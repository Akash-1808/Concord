services:
  postgres:
    image: postgres:16-alpine
    container_name: concord-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord
      POSTGRES_DB: concord
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: concord-redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
